<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>GLYPH</title>
<!--
  Vertical Slice · Phase B — The Hope Performance
  Sim: src/simulation.js · Renderer: src/cascadeRenderer.js
  Frontier = lead actor. Score hidden during performance. Curtain call before credits.
-->
<style>
  :root{
    --bg:#080a0e; --panel:#12161d; --line:#252d38; --txt:#e8eef6; --dim:#7a8799;
    --fire:#ff5a3c; --light:#ffd23c; --water:#3ca5ff; --crystal:#c46bff;
    --empty:#161b22; --lit-glow:#ffffff44;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--txt);
    font:15px/1.4 system-ui,Segoe UI,Roboto,sans-serif;min-height:100%}
  .wrap{max-width:720px;margin:0 auto;padding:16px;padding-bottom:max(16px,env(safe-area-inset-bottom))}
  h1{font-size:17px;margin:0 0 2px;font-weight:700}
  .sub{color:var(--dim);font-size:12px;margin:0 0 14px;line-height:1.45}
  .onboard{color:var(--dim);font-size:13px;margin:0 0 12px;line-height:1.5}
  .stage-wrap{position:relative;width:min(100%,440px);margin:0 auto 12px}
  #board{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;aspect-ratio:1;position:relative;z-index:1}
  #travelSvg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2}
  .cell{position:relative;background:var(--empty);border:1px solid var(--line);border-radius:10px;
        display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;
        cursor:pointer;user-select:none;color:#0c0f14;transition:filter .2s, opacity .25s;min-height:0}
  .cell.empty{color:transparent}
  .cell.F{background:var(--fire)} .cell.L{background:var(--light)}
  .cell.W{background:var(--water)} .cell.C{background:var(--crystal)}
  .cell.spark-ready{outline:2px dashed #ffffff66;outline-offset:-3px}
  .cell.lit{box-shadow:0 0 0 2px #fff, 0 0 22px 4px var(--lit-glow);filter:saturate(1.15)}
  .cell.cold{opacity:.35;filter:saturate(.5)}
  .cell.approaching{outline:2px solid #fff;outline-offset:-2px;animation:pulse 0.35s ease infinite alternate}
  @keyframes pulse{from{outline-color:#ffffff55}to{outline-color:#ffffffcc}}
  .cell.hit{animation:hit .32s ease forwards}
  @keyframes hit{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}
  .frontier-hud{text-align:center;margin:0 auto 14px;min-height:88px;display:flex;flex-direction:column;
                align-items:center;justify-content:center;gap:4px}
  .frontier-hud .label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
  .frontier-hud .chain{font-size:52px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;
                        transition:transform .12s ease}
  .frontier-hud .chain.bump{transform:scale(1.12)}
  .frontier-hud .hope{font-size:15px;font-weight:600;color:#b8c5d9;min-height:22px}
  .frontier-hud .hope.hot{color:#fff}
  .credits{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;
           margin-bottom:14px;opacity:0;transform:translateY(8px);transition:opacity .4s, transform .4s}
  .credits.show{opacity:1;transform:none}
  .credits .k{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
  .credits .score{font-size:28px;font-weight:800;color:#7ef0a6;margin:4px 0 8px}
  .credits .meta{font-size:13px;color:var(--dim)}
  #hand{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;min-height:50px;margin-bottom:12px}
  .rune{width:44px;height:44px;border-radius:9px;display:flex;align-items:center;justify-content:center;
        font-weight:800;font-size:17px;cursor:pointer;border:2px solid #0000;color:#0c0f14}
  .rune.F{background:var(--fire)} .rune.L{background:var(--light)}
  .rune.W{background:var(--water)} .rune.C{background:var(--crystal)}
  .rune.sel{border-color:#fff;transform:translateY(-2px)}
  .rune.used{opacity:.15;pointer-events:none}
  .controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:8px}
  button{background:#1e2630;color:var(--txt);border:1px solid var(--line);border-radius:9px;
         padding:8px 13px;font-size:13px;cursor:pointer;font-weight:600}
  button.primary{background:#2f6bff;border-color:#2f6bff}
  #msg{text-align:center;min-height:22px;font-size:13px;color:var(--dim)}
  .ver{text-align:center;font-size:10px;color:#4a5568;margin-top:12px}
  .perf-mode .credits{display:none}
  .perf-mode.performance .credits{display:block}
</style>
</head>
<body>
<div class="wrap perf-mode" id="root">
  <h1>GLYPH</h1>
  <p class="sub">Vertical Slice · Phase B — watch the frontier</p>
  <p class="onboard">Place runes so they touch. Tap one to spark.</p>

  <div class="frontier-hud" aria-live="polite">
    <div class="label">The frontier</div>
    <div class="chain" id="vChain">—</div>
    <div class="hope" id="vHope">Place runes. Tap one to call Action.</div>
  </div>

  <div class="stage-wrap">
    <svg id="travelSvg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
    <div id="board"></div>
  </div>

  <div id="hand"></div>

  <div class="controls">
    <button class="primary" id="btnNew">New Hand</button>
    <button id="btnClear">Clear Board</button>
    <button id="btnMute">🔊 Sound</button>
  </div>

  <div class="credits" id="credits">
    <div class="k">After the performance</div>
    <div class="score" id="vScore">0</div>
    <div class="meta" id="vMeta"></div>
  </div>

  <div id="msg">Right-click a rune to pick it up before Action.</div>
  <div class="ver" id="version"></div>
</div>

<script type="module">
import { bootGame } from "./src/game.js";
bootGame(document.getElementById("root"));
</script>
</body>
</html>

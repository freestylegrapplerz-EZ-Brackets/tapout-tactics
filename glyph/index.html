<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#06080c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>GLYPH</title>
<link rel="stylesheet" href="./src/theme.css?v=vs-1.1.0-performance-2">
</head>
<body>
<div class="wrap perf-mode" id="root">
  <h1>GLYPH</h1>
  <p class="sub">Vertical Slice · Phase 1 complete</p>
  <p class="hand-mode" id="handMode">Opening hand · Fire + Water only</p>
  <p class="onboard">Place runes so they touch. Tap one to spark.</p>

  <div class="target-line" id="vTarget">Target —</div>

  <div class="frontier-hud" aria-live="polite">
    <div class="label">The frontier</div>
    <div class="chain" id="vChain">—</div>
    <div class="hope" id="vHope">Place runes. Tap one to call Action.</div>
  </div>

  <div class="stage-wrap">
    <svg id="travelSvg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true"></svg>
    <div id="board"></div>
  </div>

  <div id="hand"></div>

  <div class="controls">
    <button id="btnP1">Performance 1</button>
    <button class="primary" id="btnP2">Performance 2</button>
    <button id="btnNew">Random Hand</button>
    <button id="btnClear">Clear Board</button>
    <button id="btnMute" aria-label="Toggle sound">🔊 Sound</button>
  </div>

  <div class="credits" id="credits">
    <div class="k">After the performance</div>
    <div class="score" id="vScore">0</div>
    <div class="meta" id="vMeta"></div>
  </div>

  <div id="msg">Drag a rune onto the board — or hold a placed rune to pick it up.</div>
  <div class="ver" id="version"></div>
</div>

<script type="module">
import { bootGame } from "./src/game.js?v=vs-1.1.0-performance-2";
bootGame(document.getElementById("root"));
</script>
</body>
</html>

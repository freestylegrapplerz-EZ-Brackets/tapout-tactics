<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
<defs>
  <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="shadow">
    <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.6"/>
  </filter>
  <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#3a4050"/>
    <stop offset="60%" stop-color="#2c3240"/>
    <stop offset="100%" stop-color="#1e2430"/>
  </linearGradient>
  <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1e2c3c"/>
    <stop offset="100%" stop-color="#111824"/>
  </linearGradient>
  <linearGradient id="pad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#0c1c38"/>
    <stop offset="50%" stop-color="#1a2e58"/>
    <stop offset="100%" stop-color="#142248"/>
  </linearGradient>
  <linearGradient id="banner" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#223880"/>
    <stop offset="100%" stop-color="#142860"/>
  </linearGradient>
  <radialGradient id="lbeam1" cx="25%" cy="0%" r="80%" gradientTransform="scale(1,0.45)">
    <stop offset="0%" stop-color="#c8e8de" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#c8e8de" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="lbeam2" cx="75%" cy="0%" r="80%" gradientTransform="scale(1,0.45)">
    <stop offset="0%" stop-color="#c8e8de" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#c8e8de" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="fglow" cx="50%" cy="20%" r="55%">
    <stop offset="0%" stop-color="#a8c8d8" stop-opacity="0.16"/>
    <stop offset="100%" stop-color="#a8c8d8" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="vleft" cx="0%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#000" stop-opacity="0.75"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="vright" cx="100%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#000" stop-opacity="0.75"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0"/>
  </radialGradient>
</defs>

